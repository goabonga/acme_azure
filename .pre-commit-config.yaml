# Local pre-commit configuration mirroring the CI quality gates.
# Install once per clone: `uv run pre-commit install` (installs the
# pre-commit AND commit-msg hooks). Run on the whole tree:
# `uv run pre-commit run --all-files`.

default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: terraform-fmt
        name: terraform fmt (modules/)
        entry: terraform fmt -check -recursive modules
        language: system
        pass_filenames: false
        files: ^modules/.*\.(tf|tftest\.hcl)$
      - id: terragrunt-hclfmt
        name: terragrunt hcl format (azure/)
        entry: terragrunt --working-dir azure hcl format --check
        language: system
        pass_filenames: false
        files: ^azure/.*\.hcl$

  - repo: local
    hooks:
      - id: spdx-headers-azure
        name: SPDX headers (azure/)
        entry: python scripts/add_license_header.py --path azure --types hcl --check
        language: system
        pass_filenames: false
        files: ^azure/.*\.hcl$
      - id: spdx-headers-modules
        name: SPDX headers (modules/)
        entry: python scripts/add_license_header.py --path modules --types tf,tftpl,hcl --check
        language: system
        pass_filenames: false
        files: ^modules/.*\.(tf|tftpl|hcl)$
      - id: spdx-headers-configs
        name: SPDX headers (configs/)
        entry: python scripts/add_license_header.py --path configs --types yaml --check
        language: system
        pass_filenames: false
        files: ^configs/.*\.yaml$
      - id: spdx-headers-workflows
        name: SPDX headers (.github/)
        entry: python scripts/add_license_header.py --path .github --types yml --check
        language: system
        pass_filenames: false
        files: ^\.github/.*\.ya?ml$
      - id: spdx-headers-scripts
        name: SPDX headers (scripts/)
        entry: python scripts/add_license_header.py --path scripts --types py,sh --check
        language: system
        pass_filenames: false
        files: ^scripts/.*\.(py|sh)$
      - id: spdx-headers-root-toml
        name: SPDX headers (root *.toml)
        entry: python scripts/add_license_header.py --path . --types toml --check
        language: system
        pass_filenames: false
        files: ^[^/]+\.toml$

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - perf
          - refactor
          - docs
          - test
          - chore
          - ci
          - build
          - style
          - deprecate
          - remove
