# multicz.toml - per-component versioning, changelogs and tags for the
# ACME Azure landing zone. Driven by Conventional Commits.
# Docs: https://goabonga.github.io/multicz/
#
# The repository is not a single package: `docs/` is the Zensical
# documentation toolchain, `azure/terragrunt.hcl` is the Terragrunt root
# wiring, `configs/config.<env>.yaml` is a per-environment input set, and
# `modules/<name>/` (see modules/README.md) will be local Terraform modules.
# Each gets its own version, changelog and tag - a release of one does not
# bump the others.
#
# `docs`, `azure` and `modules-*` release immediately on every push to
# `main` that touches their paths - the `release` job in
# .github/workflows/ci.yml bumps every component whose name does NOT start
# with `configs-` (so a new module component needs no ci.yml edit). They
# are library/wiring versions, not deployment state.
#
# `configs-<env>` components are DIFFERENT: they represent what is actually
# applied in an Azure environment, so they are excluded from that automatic
# release and are bumped only by .github/workflows/terragrunt-apply.yml,
# after `terragrunt apply` succeeds for that environment (see
# terragrunt-plan.yml / terragrunt-apply.yml for the plan -> PR -> apply
# flow). Their `depends_on` lists the components whose changes they ship,
# so the `upstream-notes` plugin below pulls those commits into the deploy's
# changelog/release notes.
#
# Adding a new component:
# - new environment: copy [components.configs-dev] below, point `paths` at
#   `configs/config.<env>.yaml`, create `configs/<env>.VERSION` +
#   `configs/<env>.CHANGELOG.md`, set `depends_on` to whatever it deploys
#   (at least "azure"), and create a `deploy/<env>` branch from `main`.
# - new module: see modules/README.md - also add it to `depends_on` of any
#   `configs-<env>` that deploys it (no ci.yml edit needed).

[project]
commit_convention = "conventional"
tag_format = "{component}-v{version}"
initial_version = "0.0.0"
# Regenerate uv.lock after a `docs` bump so the lockfile tracks the new
# version; without `allow` multicz skips the hook and the next
# `uv sync --frozen` in CI fails on lockfile drift.
post_bump_policy = "allow"
state_file = ".multicz/state.json"

[project.bump_rules]
feat = "minor"
fix = "patch"
perf = "patch"
revert = "patch"
deprecate = "minor"
remove = "minor"

# Keep-a-Changelog buckets; commits route to the section whose `types` match.
[[project.changelog_sections]]
title = "Added"
types = ["feat"]

[[project.changelog_sections]]
title = "Deprecated"
types = ["deprecate"]

[[project.changelog_sections]]
title = "Removed"
types = ["remove"]

[[project.changelog_sections]]
title = "Fixed"
types = ["fix"]

[[project.changelog_sections]]
title = "Performance"
types = ["perf"]

# Surfaces upstream (depends_on) commits in a downstream component's
# changelog/release notes - e.g. what `azure`/`modules-*` changes a
# `configs-<env>` deploy actually ships. See
# https://goabonga.github.io/multicz/ for the plugin's baseline-resolution
# rules.
[plugins.upstream-notes]
max_commits = 30
include_prereleases = false

# --- docs: the Zensical documentation toolchain -------------------------
[components.docs]
paths = ["docs/**", "pyproject.toml", "zensical.toml", "Makefile"]
bump_files = [
    { file = "pyproject.toml", key = "project.version" },
]
changelog = "docs/changelog.md"
post_bump = ["uv lock"]

# --- azure: the Terragrunt root wiring (providers, backend, versions) ---
[components.azure]
paths = ["azure/**"]
bump_files = [
    { file = "azure/VERSION" },
]
changelog = "azure/CHANGELOG.md"

# --- configs-dev: the dev environment - deployed state, not a library ---
# Bumped only by terragrunt-apply.yml after a successful apply, never by
# the generic ci.yml `release` job. See the module docstring above.
[components.configs-dev]
paths = ["configs/config.dev.yaml"]
bump_files = [
    { file = "configs/dev.VERSION" },
]
changelog = "configs/dev.CHANGELOG.md"
depends_on = ["azure"]
