name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  terraform-fmt:
    name: terraform-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - run: terraform fmt -check -recursive modules

  terragrunt-hclfmt:
    name: terragrunt-hclfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: latest
      - run: terragrunt --working-dir azure hcl format --check

  license-headers:
    name: license-headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check SPDX headers
        run: |
          python3 scripts/add_license_header.py --path azure --types hcl --check
          python3 scripts/add_license_header.py --path modules --types tf,hcl --check
          python3 scripts/add_license_header.py --path configs --types yaml --check
          python3 scripts/add_license_header.py --path .github --types yml --check
          python3 scripts/add_license_header.py --path scripts --types py,sh --check
          python3 scripts/add_license_header.py --path . --types toml --check

  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
          python-version: "3.11"
      - run: uv sync --frozen --group doc
      - run: uv run --no-sync zensical build --clean

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
          python-version: "3.11"
      - run: uv sync --frozen --all-groups
      - run: uvx pip-audit --skip-editable --path .venv

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install OSV-Scanner
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64" \
            -o "$HOME/.local/bin/osv-scanner"
          chmod +x "$HOME/.local/bin/osv-scanner"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: osv-scanner scan source --lockfile=uv.lock

  release:
    name: release
    needs: [terraform-fmt, terragrunt-hclfmt, license-headers, docs-build, pip-audit, osv-scanner]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      no_bumps: ${{ steps.bump.outputs.no_bumps }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      # NOTE: no python-version pin here - multicz needs Python >=3.12 and
      # `uv tool install multicz` fails under 3.11.
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install multicz
        run: uv tool install multicz
      - name: Configure git author
        run: |
          NAME="${{ github.event.head_commit.author.name }}"
          EMAIL="${{ github.event.head_commit.author.email }}"
          git config user.name  "${NAME:-github-actions[bot]}"
          git config user.email "${EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
      - name: Detect GPG availability
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Import and unlock GPG key
        if: steps.gpg.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo test | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            --pinentry-mode loopback --sign > /dev/null
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          git config user.signingkey "$KEY_ID"
      - name: Plan release
        run: uv tool run multicz plan --summary "$GITHUB_STEP_SUMMARY"
      - name: Bump, commit, tag, push (signed)
        id: bump_signed
        if: steps.gpg.outputs.available == 'true'
        run: |
          set -euo pipefail
          PLAN=$(uv tool run multicz bump --commit --tag --push --sign --output json)
          BUMPED=$(echo "$PLAN" | jq -r '.bumps | keys | join(" ")')
          if [ -z "$BUMPED" ]; then echo "no_bumps=true" >> "$GITHUB_OUTPUT";
          else echo "no_bumps=false" >> "$GITHUB_OUTPUT"; fi
      - name: Bump, commit, tag, push
        id: bump_unsigned
        if: steps.gpg.outputs.available != 'true'
        run: |
          set -euo pipefail
          PLAN=$(uv tool run multicz bump --commit --tag --push --output json)
          BUMPED=$(echo "$PLAN" | jq -r '.bumps | keys | join(" ")')
          if [ -z "$BUMPED" ]; then echo "no_bumps=true" >> "$GITHUB_OUTPUT";
          else echo "no_bumps=false" >> "$GITHUB_OUTPUT"; fi
      - name: Resolve release outputs
        id: bump
        run: |
          if [ "${{ steps.gpg.outputs.available }}" = "true" ]; then
            echo 'no_bumps=${{ steps.bump_signed.outputs.no_bumps }}' >> "$GITHUB_OUTPUT"
          else
            echo 'no_bumps=${{ steps.bump_unsigned.outputs.no_bumps }}' >> "$GITHUB_OUTPUT"
          fi

  docs:
    name: docs
    needs: [docs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install Zensical (doc group)
        run: uv sync --frozen --group doc
      - name: Build site
        run: uv run zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
