name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  terraform-fmt:
    name: terraform-fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - run: terraform fmt -check -recursive modules

  terragrunt-hclfmt:
    name: terragrunt-hclfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: latest
      - run: terragrunt --working-dir azure hcl format --check

  license-headers:
    name: license-headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check SPDX headers
        run: |
          python3 scripts/add_license_header.py --path azure --types hcl --check
          python3 scripts/add_license_header.py --path modules --types tf,tftpl,hcl --check
          python3 scripts/add_license_header.py --path configs --types yaml --check
          python3 scripts/add_license_header.py --path .github --types yml --check
          python3 scripts/add_license_header.py --path scripts --types py,sh --check
          python3 scripts/add_license_header.py --path . --types toml --check

  terraform-test:
    name: terraform-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      # mock_provider (Terraform >= 1.7) intercepts every call - no real
      # Azure credentials or network access needed, see
      # CONTRIBUTING.md#running-terraform-tests.
      - name: Run terraform test for every module with a tests/ directory
        run: |
          set -euo pipefail
          for dir in modules/*/; do
            if [ -d "${dir}tests" ]; then
              echo "::group::terraform test ${dir}"
              (cd "$dir" && terraform init -backend=false -input=false && terraform test)
              echo "::endgroup::"
            fi
          done

  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
          python-version: "3.11"
      - run: uv sync --frozen --group doc
      - run: uv run --no-sync zensical build --clean

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
          python-version: "3.11"
      - run: uv sync --frozen --all-groups
      - run: uvx pip-audit --skip-editable --path .venv

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: modules
          quiet: true
          output_format: cli
          # CKV_SECRET_6 ("Base64 High Entropy String") false-positives on
          # the literal Key Vault secret NAME "github-runner-pat" in
          # modules/hub-runners/main.tf (`pat_secret_name = "..."`) - that's
          # what secret to read at boot, not a secret value itself. See
          # https://github.com/goabonga/acme_azure/actions/runs/29200510249.
          skip_check: CKV_SECRET_6

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: modules
          exit-code: "1"
          severity: "HIGH,CRITICAL"

  release:
    name: release
    needs: [terraform-fmt, terragrunt-hclfmt, license-headers, terraform-test, docs-build, pip-audit, checkov, trivy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      no_bumps: ${{ steps.bump.outputs.no_bumps }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      # NOTE: no python-version pin here - multicz needs Python >=3.12 and
      # `uv tool install multicz` fails under 3.11.
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install multicz
        run: uv tool install multicz
      - name: Configure git author
        run: |
          NAME="${{ github.event.head_commit.author.name }}"
          EMAIL="${{ github.event.head_commit.author.email }}"
          git config user.name  "${NAME:-github-actions[bot]}"
          git config user.email "${EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
      - name: Detect GPG availability
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Import and unlock GPG key
        if: steps.gpg.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo test | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            --pinentry-mode loopback --sign > /dev/null
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          git config user.signingkey "$KEY_ID"
      - name: Plan release
        id: plan
        run: |
          set -euo pipefail
          uv tool run multicz plan --summary "$GITHUB_STEP_SUMMARY"
          # configs-<env> components are deployment state, not a library -
          # they release only from terragrunt-apply.yml after a successful
          # `terragrunt apply`, never from this generic push-to-main job.
          PLAN=$(uv tool run multicz plan --output json)
          COMPONENTS=$(echo "$PLAN" | jq -r '.bumps | keys[] | select(startswith("configs-") | not)')
          ARGS=""
          for c in $COMPONENTS; do ARGS="$ARGS --component $c"; done
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          if [ -n "$COMPONENTS" ]; then echo "has_bumps=true" >> "$GITHUB_OUTPUT";
          else echo "has_bumps=false" >> "$GITHUB_OUTPUT"; fi
      - name: Bump, commit, tag, push (signed)
        id: bump_signed
        if: steps.plan.outputs.has_bumps == 'true' && steps.gpg.outputs.available == 'true'
        run: |
          set -euo pipefail
          uv tool run multicz bump ${{ steps.plan.outputs.args }} --commit --tag --push --sign --output json
      - name: Bump, commit, tag, push
        id: bump_unsigned
        if: steps.plan.outputs.has_bumps == 'true' && steps.gpg.outputs.available != 'true'
        run: |
          set -euo pipefail
          uv tool run multicz bump ${{ steps.plan.outputs.args }} --commit --tag --push --output json
      - name: Resolve release outputs
        id: bump
        run: |
          if [ "${{ steps.plan.outputs.has_bumps }}" != "true" ]; then
            echo "no_bumps=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_bumps=false" >> "$GITHUB_OUTPUT"
          fi

  docs:
    name: docs
    needs: [docs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install Zensical (doc group)
        run: uv sync --frozen --group doc
      - name: Build site
        run: uv run zensical build --clean
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
