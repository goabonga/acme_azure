# Runs `terragrunt apply` for an environment once its deploy PR
# (opened by terragrunt-plan.yml) is merged into `deploy/<env>`. Protect
# that branch (required reviewers / required approving review) so only an
# authorized group can trigger this - see CONTRIBUTING.md.
#
# On a successful apply, bumps the `configs-<env>` multicz component: if
# commits touching `configs/config.<env>.yaml` itself already justify a
# bump, that drives the version/kind; otherwise the deploy is still real
# and is recorded as a forced patch bump. Either way the `upstream-notes`
# plugin (see multicz.toml) pulls in what `azure`/`modules-*` commits this
# deploy actually shipped. The release commit + tag are pushed to
# `deploy/<env>` first, then fast-forwarded onto `main`.

name: terragrunt-apply

on:
  push:
    branches: ["deploy/*"]

concurrency:
  group: terragrunt-apply-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-env:
    name: resolve-env
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.name.outputs.env }}
    steps:
      - id: name
        run: echo "env=${GITHUB_REF_NAME#deploy/}" >> "$GITHUB_OUTPUT"

  apply:
    name: apply (${{ needs.resolve-env.outputs.env }})
    needs: [resolve-env]
    runs-on: ubuntu-latest
    # Protect this environment (Settings -> Environments -> required
    # reviewers) for a second gate on top of deploy/<env> branch protection.
    environment: ${{ needs.resolve-env.outputs.env }}
    permissions:
      contents: write
      id-token: write # required for azure/login OIDC
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: latest
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt apply
        env:
          ENV: ${{ needs.resolve-env.outputs.env }}
        run: |
          set -euo pipefail
          terragrunt --non-interactive --working-dir azure \
            run --all -- apply -auto-approve -input=false

      # NOTE: no python-version pin here - multicz needs Python >=3.12 and
      # `uv tool install multicz` fails under 3.11.
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - name: Install multicz
        run: uv tool install multicz
      - name: Configure git author
        env:
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
        run: |
          git config user.name  "${AUTHOR_NAME:-github-actions[bot]}"
          git config user.email "${AUTHOR_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
      - name: Detect GPG availability
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Import and unlock GPG key
        if: steps.gpg.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo test | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            --pinentry-mode loopback --sign > /dev/null
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          git config user.signingkey "$KEY_ID"

      - name: Bump configs-<env> and sync deploy branch
        env:
          COMPONENT: configs-${{ needs.resolve-env.outputs.env }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SIGN_FLAG=""
          if [ "${{ steps.gpg.outputs.available }}" = "true" ]; then SIGN_FLAG="--sign"; fi

          PLAN=$(uv tool run multicz plan --output json)
          PENDING=$(echo "$PLAN" | jq -r --arg c "$COMPONENT" '.bumps[$c] // empty')
          if [ -n "$PENDING" ]; then
            uv tool run multicz bump --component "$COMPONENT" --commit --tag --push $SIGN_FLAG --output json
          else
            # No commit on configs/config.<env>.yaml itself justified a bump
            # (the apply may have been driven by an azure/** or modules/**
            # change instead) - the deploy still happened, so record it.
            uv tool run multicz bump --force "${COMPONENT}:patch" --commit --tag --push $SIGN_FLAG --output json
          fi

          # Propagate the release commit + everything this deploy shipped
          # back onto main. Plain (non-force) push: main must not have
          # diverged from this branch's history since the deploy PR merged.
          git push origin "HEAD:main"
