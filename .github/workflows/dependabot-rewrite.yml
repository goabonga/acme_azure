name: dependabot-rewrite

# `pull_request_target` so the workflow can read GPG_PRIVATE_KEY /
# GPG_PASSPHRASE (regular `pull_request` runs without secrets on bot events).
# The workflow body is loaded from `main`, not the PR branch, so no untrusted
# code runs. The actor gate restricts it to genuine Dependabot PRs.
#
# DEPENDABOT_REWRITE_PAT (optional): a fine-grained PAT scoped to this repo,
# contents:write. Without it, the rewritten commits still get pushed (using
# the default GITHUB_TOKEN) but ci.yml never re-runs against the new SHA
# (GITHUB_TOKEN pushes don't trigger other workflows) - fine if branch
# protection doesn't require status checks, a stuck PR otherwise.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  rewrite:
    name: rewrite dependabot commits
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    concurrency:
      group: dependabot-rewrite-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Check GPG availability
        id: gate
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$GPG_PASSPHRASE" ]; then
            {
              echo "## Dependabot rewrite: skipped"
              echo ""
              echo "GPG_PRIVATE_KEY and/or GPG_PASSPHRASE are not configured. "
              echo "The Dependabot PR ships with bot-authored, web-signed commits."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::GPG secrets unset; leaving Dependabot commits as-is"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head branch
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true
          # Rewriting amends every commit, so the pushed SHA is new even
          # though the diff is identical - GitHub ties status checks to a
          # SHA, and a push authenticated with the default GITHUB_TOKEN
          # never triggers other workflows (anti-recursion protection), so
          # ci.yml would never run against it and the PR could get stuck
          # if branch protection requires checks. DEPENDABOT_REWRITE_PAT
          # (fine-grained, contents:write on this repo) fixes that; falls
          # back to the default token (same behavior as before, same
          # caveat) if the secret isn't configured - see CONTRIBUTING.md.
          token: ${{ secrets.DEPENDABOT_REWRITE_PAT || github.token }}

      - name: Configure GPG and git identity from the imported key
        if: steps.gate.outputs.skip != 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo test | gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            --pinentry-mode loopback --sign > /dev/null
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          UID_LINE=$(gpg --list-keys --with-colons "$KEY_ID" | awk -F: '/^uid/{print $10; exit}')
          NAME="${UID_LINE%% <*}"
          EMAIL=$(printf '%s' "$UID_LINE" | sed -nE 's/.*<([^>]+)>.*/\1/p')
          git config user.name  "$NAME"
          git config user.email "$EMAIL"
          git config user.signingkey "$KEY_ID"
          git config commit.gpgsign true

      - name: Rewrite commits with scope-aware messages
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          BASE_SHA=$(git merge-base "origin/${{ github.event.pull_request.base.ref }}" HEAD)
          git rebase "$BASE_SHA" --exec "scripts/rewrite-dependabot-commit.sh"

      - name: Force-push rewritten branch
        if: steps.gate.outputs.skip != 'true'
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git push --force-with-lease origin "HEAD:${HEAD_REF}"

      - name: Write step summary
        if: steps.gate.outputs.skip != 'true' && success()
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HAS_PAT: ${{ secrets.DEPENDABOT_REWRITE_PAT != '' }}
        run: |
          {
            echo "## Dependabot rewrite: applied"
            echo ""
            echo "PR branch \`${HEAD_REF}\` rewritten:"
            echo ""
            echo "- Conventional-commits scope inferred from changed files / dev-group membership"
            echo "- Authored and GPG-signed as \`$(git config user.name) <$(git config user.email)>\`"
            if [ "$HAS_PAT" = "true" ]; then
              echo "- Pushed with DEPENDABOT_REWRITE_PAT - ci.yml re-runs against the new commit"
            else
              echo "- Pushed with the default GITHUB_TOKEN - **ci.yml will NOT re-run** on this new commit (set DEPENDABOT_REWRITE_PAT to fix)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
