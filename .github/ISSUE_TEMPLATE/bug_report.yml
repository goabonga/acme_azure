name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which independently-versioned component is affected? See multicz.toml."
      options:
        - docs
        - configs-dev
        - a Terraform module under modules/
        - other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Component version
      description: "The component's tag, e.g. `docs-v0.3.0` (see git tags or CHANGELOG.md)."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue? Include the exact command line (terragrunt/terraform/make).
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: terragrunt-version
    attributes:
      label: Terraform / Terragrunt Version
      description: "Output of `terraform version` and `terragrunt --version` (leave blank for docs-only bugs)."

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      render: shell
