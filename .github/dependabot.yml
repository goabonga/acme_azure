# Dependabot v2 configuration.

version: 2

updates:
  # Python dev/doc tooling via uv (pre-commit, zensical). No runtime
  # dependencies are declared - every bump here is tooling, hence a single
  # chore(deps) prefix (see scripts/rewrite-dependabot-commit.sh).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    ignore:
      # `hatchling` lives in [build-system].requires; Dependabot's uv
      # FileUpdater cannot write that table. Bump it by hand.
      - dependency-name: "hatchling"
    groups:
      dev-tools:
        applies-to: version-updates
        patterns:
          - "pre-commit"
          - "zensical"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python"

  # Terraform provider version constraints - each module has its own
  # versions.tf, and `directory: "/"` errors ("No files found in /") since
  # there's no .tf directly at repo root - see
  # https://github.com/goabonga/acme_azure/actions/runs/29198457678.
  # `directories` (plural) is glob-aware: new modules under modules/ are
  # picked up automatically, no edit needed here.
  - package-ecosystem: "terraform"
    directories:
      - "/modules/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix(deps)"
    labels:
      - "dependencies"
      - "terraform"

  # Pinned versions of GitHub Actions in `.github/workflows/*.yml`.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    groups:
      ci-actions:
        applies-to: version-updates
        patterns:
          - "actions/*"
          - "astral-sh/*"
          - "hashicorp/*"
          - "gruntwork-io/*"
          - "autero1/*"
          - "bridgecrewio/*"
          - "aquasecurity/*"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
