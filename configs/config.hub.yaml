subscription:
  # id - Azure subscription id the hub network/runners are created in.
  id: 980de408-b1e8-46ea-87e0-a1d5c0660dbd
remote_state:
  # resource_group_name - Resource group holding the state storage account.
  resource_group_name: rg-acme-azure-hub
  # storage_account_name - Storage account used as the azurerm remote state backend.
  storage_account_name: acmeazurehubstate
  # container_name - Blob container inside the storage account.
  container_name: tfstate
plans:
  # storage_account_name - Private storage account terragrunt-plan.yml
  # uploads full `terragrunt plan` output to.
  storage_account_name: acmeazurehubplans
  # container_name - Blob container inside the storage account.
  container_name: plans
hub:
  # resource_group_name - Resource group for the hub network + runners.
  resource_group_name: rg-acme-azure-hub
  # location - Azure region. See docs/index.md (EU residency).
  location: francecentral
  network:
    # enabled - when false, azure/hub/network's `terraform.source` becomes
    # null and terragrunt skips the unit entirely (no plan/apply). Other
    # hub units depend on this one, so disabling it effectively disables
    # the whole hub.
    enabled: true
    address_space:
      - 10.0.0.0/16
    runner_subnet_prefixes:
      - 10.0.1.0/24
    private_endpoint_subnet_prefixes:
      - 10.0.2.0/24
  runners:
    # enabled - same pattern as network.enabled, for azure/hub/runners.
    # Turn off to tear down the VMSS/Key Vault while keeping the network
    # and storage endpoints (e.g. cost-saving pause).
    enabled: true
    # github_repo - "<owner>/<repo>" the runners register against.
    github_repo: goabonga/acme_azure
    # runner_labels - comma-separated, no spaces. All environments whose
    # GitHub Environment `RUNNER_LABEL` variable matches this share this
    # pool - see CONTRIBUTING.md.
    runner_labels: self-hosted,azure,hub
    # runner_version - actions/runner release to install.
    runner_version: 2.321.0
    # vm_size - VMSS instance size.
    vm_size: Standard_D2s_v5
    # instances - fixed capacity. 0 until scripts/bootstrap-runner.sh does
    # the first scale-out (no event-driven autoscaler yet).
    instances: 0
    # admin_username - local admin user for operator troubleshooting.
    admin_username: runneradmin
    # admin_ssh_public_key - matching SSH public key (no password auth).
    admin_ssh_public_key:
  storage_endpoints:
    # enabled - same pattern, for azure/hub/storage-endpoints.
    enabled: true
    # entries - one per environment storage account to reach privately
    # from the hub VNet. `key` must be unique. Add one pair (state +
    # plans) per environment registered in configs/config.<env>.yaml.
    entries:
      - key: dev-state
        resource_group_name: rg-acme-azure-dev
        storage_account_name: acmeazuredevstate
      - key: dev-plans
        resource_group_name: rg-acme-azure-dev
        storage_account_name: acmeazuredevplans
